
<div class="report-wrapper">

  <!-- Error -->
  <div *ngIf="errorMessage" class="error-box">
    {{ errorMessage }}
  </div>

  <!-- Optional loading state -->
  <div *ngIf="!reportUrl && !errorMessage" class="report-loading">
    Loading report...
  </div>

  <!-- Report iframe -->
  <iframe
    *ngIf="reportUrl"
    [src]="reportUrl"
    class="report-frame"
    allowfullscreen>
  </iframe>

</div>
