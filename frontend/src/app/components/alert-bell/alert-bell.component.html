<div class="bell-wrapper">

  <!-- Bouton cloche -->
  <button
    class="bell-btn"
    (click)="toggle(); $event.stopPropagation()"
    [class.has-critical]="store.criticalCount() > 0"
    [title]="store.unreadCount() + ' alerte(s) non lue(s)'"
  >
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path
        d="M12 2a7 7 0 0 1 7 7c0 2.4-1.2 4.5-3 5.7V17a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-2.3A7 7 0 0 1 12 2z"
        stroke="currentColor" stroke-width="1.6" fill="none"
      />
      <path d="M9 21h6M10 18v3M14 18v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>

    <span
      class="bell-badge"
      *ngIf="store.unreadCount() > 0"
      [class.critical]="store.criticalCount() > 0"
    >
      {{ store.unreadCount() > 99 ? '99+' : store.unreadCount() }}
    </span>
  </button>

  <!-- Popup modal -->
  <div class="alert-modal-backdrop" *ngIf="open" (click)="close()"></div>
  <div class="alert-dropdown" *ngIf="open" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="drop-header">
      <div class="drop-header-left">
        <span class="drop-icon">🔔</span>
        <span class="drop-title">Alertes KPI</span>
      </div>
      <div class="drop-header-right">
        <span class="drop-count" *ngIf="store.unreadCount() > 0">
          {{ store.unreadCount() }} non lue{{ store.unreadCount() > 1 ? 's' : '' }}
        </span>
        <button 
          class="icon-btn" 
          (click)="store.markAllRead()"
          *ngIf="store.unreadCount() > 0"
          title="Tout marquer comme lu"
        >
          ✓✓
        </button>
        <button class="icon-btn close-btn" (click)="close()" title="Fermer">✕</button>
      </div>
    </div>

    <!-- Empty State -->
    <div class="drop-empty" *ngIf="store.alerts().length === 0">
      <div class="empty-icon">✅</div>
      <p class="empty-title">Tout est calme</p>
      <p class="empty-subtitle">Aucune alerte à signaler</p>
    </div>

    <!-- Alert List -->
    <div class="alert-list" *ngIf="store.alerts().length > 0">
      <div
        *ngFor="let a of store.alerts(); trackBy: trackById"
        class="alert-item"
        [class.unread]="!a.read"
        [class.critical]="a.severity === 'critical'"
        [class.warning]="a.severity === 'warning'"
        (click)="store.markRead(a.id)"
      >
        <div class="alert-badge">
          <span class="alert-status-dot" [class.critical]="a.severity === 'critical'" [class.warning]="a.severity === 'warning'"></span>
        </div>

        <div class="alert-content">
          <div class="alert-header">
            <span class="alert-title">{{ a.title }}</span>
            <span class="alert-time">{{ a.timestamp | date:'HH:mm' }}</span>
          </div>
          <p class="alert-message">{{ a.message }}</p>
          <div class="alert-footer">
            <span class="alert-role">{{ a.role | uppercase }}</span>
            <span class="alert-severity" [class.critical]="a.severity === 'critical'" [class.warning]="a.severity === 'warning'">
              {{ a.severity === 'critical' ? '● Critique' : '● Attention' }}
            </span>
          </div>
        </div>

        <button
          class="dismiss-btn"
          title="Ignorer"
          (click)="$event.stopPropagation(); store.dismiss(a.id)"
        >
          ✕
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="drop-footer" *ngIf="store.alerts().length > 0">
      <button class="footer-btn clear-btn" (click)="store.clearAll()">
        Effacer toutes les alertes
      </button>
    </div>

  </div>
</div>
